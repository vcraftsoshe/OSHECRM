name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build
      - run: npm install --prefix functions

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: oshe-895ad
          channelId: live

      - name: Deploy Firestore rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          npx firebase-tools deploy --only firestore:rules --project oshe-895ad
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

      - name: Deploy Storage rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          npx firebase-tools deploy --only storage:rules --project oshe-895ad
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        continue-on-error: true

      - name: Deploy Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-key.json
          npx firebase-tools deploy --only functions --project oshe-895ad
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        continue-on-error: true
